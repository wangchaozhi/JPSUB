# 安装:pip install pre-commit && pre-commit install
# 手动全量:pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=2048]

  # Rust(需本机装 rustfmt / clippy:rustup component add rustfmt clippy)
  - repo: local
    hooks:
      - id: rustfmt
        name: rustfmt
        entry: bash -c 'cd shell/src-tauri && cargo fmt'
        language: system
        files: \.rs$
        pass_filenames: false
      - id: clippy
        name: clippy
        entry: bash -c 'cd shell/src-tauri && cargo clippy -- -D warnings'
        language: system
        files: \.rs$
        pass_filenames: false

  # 前端(需本机装好 ui/ 依赖)
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'cd ui && npx eslint .'
        language: system
        files: \.(ts|tsx)$
        pass_filenames: false
      - id: prettier
        name: prettier
        entry: bash -c 'cd ui && npx prettier --check .'
        language: system
        files: \.(ts|tsx|css|json)$
        pass_filenames: false
